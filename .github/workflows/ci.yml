name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit and UI tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Show toolchain
        run: xcodebuild -version

      - name: Prepare iPad simulator
        run: |
          SIMULATOR_ID="$(
            xcrun simctl list devices available --json |
              jq -r '[.devices[][] | select(.name | startswith("iPad"))] | first | .udid // empty'
          )"

          if [[ -z "$SIMULATOR_ID" ]]; then
            RUNTIME_ID="$(
              xcrun simctl list runtimes --json |
                jq -r '[.runtimes[] | select(.isAvailable and (.name | startswith("iOS")))] | sort_by(.version) | last | .identifier'
            )"
            DEVICE_TYPE_ID="$(
              xcrun simctl list devicetypes --json |
                jq -r '[.devicetypes[] | select(.name | startswith("iPad"))] | last | .identifier'
            )"
            SIMULATOR_ID="$(
              xcrun simctl create "MySay CI iPad" "$DEVICE_TYPE_ID" "$RUNTIME_ID"
            )"
          fi

          xcrun simctl boot "$SIMULATOR_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MySay.xcodeproj \
            -scheme MySay \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
