name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project MySay.xcodeproj \
            -scheme MySay \
            -destination 'platform=iOS Simulator,name=iPad Pro 11-inch (M4),OS=latest' \
            -only-testing:MySayTests \
            -skip-testing:MySayTests/SpeechAudioTests \
            CODE_SIGNING_ALLOWED=NO
