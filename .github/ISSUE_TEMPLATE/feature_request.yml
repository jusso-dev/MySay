name: Feature request
description: Suggest an improvement to MySay.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: need
    attributes:
      label: User need
      description: What communication or caregiving need would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the experience rather than only the technical solution.
    validations:
      required: true
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility and privacy considerations
      description: Consider motor planning, VoiceOver, Dynamic Type, offline use, and sensitive data.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
